server {
    listen 80;
    server_name datagov.welcomd.com localhost;

    # Default is 1m, which 413s governance CSV imports for larger catalogs.
    # 10m is ample headroom for a text metadata file while still bounding abuse.
    client_max_body_size 10m;

    # Re-resolve `web`/`frontend` via Docker's embedded DNS at request time
    # instead of caching their IPs at startup. Without this, recreating a
    # container (e.g. `docker compose up --build`) hands it a new IP while nginx
    # keeps the old one -> 502 until nginx restarts. `valid=10s` picks up the new
    # IP within ~10s, so no manual `restart nginx` is needed.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Common proxy settings — declared once here, inherited by every location.
    # Cloudflare forwards the original protocol in X-Forwarded-Proto.
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 300s;
    proxy_redirect off;

    # --- Django: REST API (the React SPA's only data source) ---
    # proxy_buffering off so streamed/long chatbot responses flush immediately.
    location /api/ {
        set $upstream_web web:8000;
        proxy_pass http://$upstream_web;
        proxy_buffering off;
    }

    # --- Django admin ---
    location /admin/ {
        set $upstream_web web:8000;
        proxy_pass http://$upstream_web;
    }

    # --- Django/DRF/admin static assets (collectstatic -> shared volume) ---
    location /static/ {
        alias /app/staticfiles/;
    }

    # --- User-uploaded media (org branding icon) — served straight from the
    # shared media volume that `web` writes uploads into, same pattern as
    # /static/. No gunicorn round-trip; survives container rebuilds. ---
    location /media/ {
        alias /app/media/;
    }

    # --- Everything else -> the Next.js SPA (incl. /_next/* asset routes) ---
    location / {
        set $upstream_front frontend:3000;
        proxy_pass http://$upstream_front;
    }
}
