# Root orchestration for the whole monorepo: local Postgres (db) + Django API
# (web) + Django-Q (worker) + Next.js SPA (frontend), all behind a single nginx
# entry on :80.
#
#   docker compose up -d db                 # 1. start the local database
#   pwsh scripts/seed-local-db.ps1          # 2. dump production into it (one-time)
#   docker compose up --build               # 3. start the whole stack
#
# nginx routes /api,/admin,/static,/media -> Django; everything else -> Next.
# The app talks to the LOCAL 'db' Postgres (DB_HOST=db in backend/.env), seeded
# from production — so ETL writes never touch the production database.
#
# Project name is pinned so the stack identity (containers, volumes, network) is
# stable regardless of the folder name.
name: datagov_platform
services:
  db:
    image: postgres:18
    # Local-only credentials — must match DB_USER/DB_PASSWORD/DB_NAME in backend/.env.
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog_local_pw
      POSTGRES_DB: catalog
    volumes:
      # Postgres 18+ images store data in a major-version subdir, so the mount
      # goes at /var/lib/postgresql (not .../data as in <=17).
      - pgdata:/var/lib/postgresql
    ports:
      # Host access for psql / DBeaver. Change the left side if 5432 is taken.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  web:
    build:
      context: ./backend
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      # User-uploaded media (org branding icon) — persisted across rebuilds and
      # shared with nginx, which serves /media/ straight from this volume.
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: ./backend
    command: python manage.py qcluster
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # In-network fallback for Next's server-side rewrites; browser traffic
        # reaches /api through nginx on the same origin, never this value.
        NEXT_PUBLIC_API_URL: http://web:8000
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
      - frontend
    restart: always

volumes:
  static_volume:
  media_volume:
  pgdata:
