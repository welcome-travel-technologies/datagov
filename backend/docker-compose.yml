services:
  web:
    build: .
    expose:
      - 8000
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env
    restart: always

  worker:
    build: .
    command: python manage.py qcluster
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
