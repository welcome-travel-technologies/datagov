server {
    listen 80;
    server_name datagov.welcomd.com localhost;

    # Default is 1m, which 413s governance CSV imports for larger catalogs
    # (one row per ItemGroup + descriptions). 10m is ample headroom for a
    # text metadata file while still bounding abuse.
    client_max_body_size 10m;

    # Re-resolve the `web` service via Docker's embedded DNS at request time
    # instead of caching its IP at nginx startup. Without this, recreating the
    # `web` container (e.g. `docker compose up --build`) gives it a new IP while
    # nginx keeps the old one -> 502 until nginx is restarted. `valid=10s` makes
    # nginx pick up the new IP within ~10s, so no `down`/`restart nginx` needed.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Cloudflare forwards the original protocol (HTTP or HTTPS) in X-Forwarded-Proto
    location / {
        # Using a variable in proxy_pass forces the resolver to run per-request.
        set $upstream_web web:8000;
        proxy_pass http://$upstream_web;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    location /static/ {
        alias /app/staticfiles/;
    }
}
